<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="100%" height="100%">
    <defs>
        <radialGradient id="orbIndigo" cx="0%" cy="0%" r="70%">
            <stop offset="0%" stop-color="#4f46e5" stop-opacity="0.5" />
            <stop offset="100%" stop-color="transparent" stop-opacity="0" />
        </radialGradient>
        <radialGradient id="orbPink" cx="100%" cy="100%" r="70%">
            <stop offset="0%" stop-color="#ec4899" stop-opacity="0.3" />
            <stop offset="100%" stop-color="transparent" stop-opacity="0" />
        </radialGradient>
        <radialGradient id="orbCyan" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.25" />
            <stop offset="100%" stop-color="transparent" stop-opacity="0" />
        </radialGradient>

        <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#6366f1" />
            <stop offset="100%" stop-color="#06b6d4" />
        </linearGradient>
        <linearGradient id="sparkGrad" x1="0%" y1="100%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#f8f9fa" />
            <stop offset="100%" stop-color="#e2e8f0" />
        </linearGradient>

        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="6" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        <filter id="glowSoft" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>

    <rect width="256" height="256" rx="56" fill="#050507" />
    <rect width="256" height="256" rx="56" fill="url(#orbIndigo)" />
    <rect width="256" height="256" rx="56" fill="url(#orbPink)" />
    <rect width="256" height="256" rx="56" fill="url(#orbCyan)" />

    <rect x="2" y="2" width="252" height="252" rx="54" fill="rgba(18, 18, 22, 0.4)" stroke="rgba(255, 255, 255, 0.12)" stroke-width="2" />

    <g stroke="rgba(255, 255, 255, 0.2)" stroke-width="8" stroke-linecap="round" fill="none">
        <path d="M 64 88 L 64 64 L 88 64" />
        <path d="M 192 88 L 192 64 L 168 64" />
        <path d="M 64 168 L 64 192 L 88 192" />
        <path d="M 192 168 L 192 192 L 168 192" />
    </g>

    <circle cx="128" cy="128" r="54" fill="none" stroke="rgba(255, 255, 255, 0.05)" stroke-width="12" />
    <circle cx="128" cy="128" r="54" fill="none" stroke="url(#ringGrad)" stroke-width="12" stroke-dasharray="140 339" stroke-linecap="round" transform="rotate(-45 128 128)" filter="url(#glowSoft)" />
    <line x1="56" y1="128" x2="200" y2="128" stroke="rgba(6, 182, 212, 0.5)" stroke-width="2" filter="url(#glowSoft)" />
    <path d="M 128 88 Q 128 128 168 128 Q 128 128 128 168 Q 128 128 88 128 Q 128 128 128 88 Z" fill="url(#sparkGrad)" filter="url(#glow)" />
    <path d="M 172 74 Q 172 90 188 90 Q 172 90 172 106 Q 172 90 156 90 Q 172 90 172 74 Z" fill="#ec4899" filter="url(#glowSoft)" />
</svg>
