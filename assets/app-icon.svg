<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="title desc">
  <title id="title">RadPrompt App Icon</title>
  <desc id="desc">A dark glass rounded-square icon with radiology scan rings, a prompt cursor, and RP monogram.</desc>
  <defs>
    <radialGradient id="bgGlow" cx="30%" cy="22%" r="90%">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="34%" stop-color="#4f46e5"/>
      <stop offset="68%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#050507"/>
    </radialGradient>
    <linearGradient id="glass" x1="18" y1="10" x2="110" y2="118" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="45%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="accent" x1="28" y1="34" x2="102" y2="98" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="48%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#f0abfc"/>
    </linearGradient>
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#000000" flood-opacity="0.45"/>
      <feDropShadow dx="0" dy="0" stdDeviation="7" flood-color="#6366f1" flood-opacity="0.35"/>
    </filter>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="8" y="8" width="112" height="112" rx="28" fill="url(#bgGlow)" filter="url(#shadow)"/>
  <rect x="10" y="10" width="108" height="108" rx="26" fill="url(#glass)" stroke="#ffffff" stroke-opacity="0.22"/>
  <path d="M30 42c0-7.18 5.82-13 13-13h42c7.18 0 13 5.82 13 13v44c0 7.18-5.82 13-13 13H43c-7.18 0-13-5.82-13-13V42Z" fill="#07070b" fill-opacity="0.62" stroke="#ffffff" stroke-opacity="0.13"/>

  <g fill="none" stroke="url(#accent)" stroke-linecap="round" stroke-linejoin="round" filter="url(#softGlow)">
    <path d="M41 64c8.8-17.5 37.2-17.5 46 0" stroke-width="5" opacity="0.95"/>
    <path d="M48 64c6.1-9.3 25.9-9.3 32 0" stroke-width="4" opacity="0.72"/>
    <path d="M37 78h54" stroke-width="5" opacity="0.95"/>
    <path d="M64 42v44" stroke-width="4" opacity="0.55"/>
  </g>

  <path d="M82 35h11v11" fill="none" stroke="#e0e7ff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.92"/>
  <path d="M93 35 79 49" fill="none" stroke="#e0e7ff" stroke-width="4" stroke-linecap="round" opacity="0.92"/>
  <path d="M42 91h28" fill="none" stroke="#f8fafc" stroke-width="4" stroke-linecap="round" opacity="0.9"/>
  <path d="M42 84h15" fill="none" stroke="#f8fafc" stroke-width="4" stroke-linecap="round" opacity="0.68"/>

  <text x="64" y="73" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="800" letter-spacing="-1.5" fill="#ffffff">RP</text>
</svg>
