<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RadPrompt</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <div id="app-container" class="aero-glass">
        <header id="top-header">
            <div id="breadcrumb"></div>
            <div id="controls">
                <button id="btn-add-folder" class="control-btn" title="Ordner hinzufügen">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path><line x1="12" y1="11" x2="12" y2="17"></line><line x1="9" y1="14" x2="15" y2="14"></line></svg>
                    <span>Ordner</span>
                </button>
                <button id="btn-add-prompt" class="control-btn" title="Prompt hinzufügen">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg>
                    <span>Prompt</span>
                </button>
                <button id="btn-toggle-sort" class="control-btn" title="Sortieren aktivieren">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
                    <span>Sortieren</span>
                </button>
            </div>
        </header>

        <div id="folder-selector-container">
            <div id="folder-selector"></div>
        </div>

        <main id="card-grid"></main>

        <div id="favorites-bar" class="collapsed">
            <div id="favorites-header">
                <span>Favoriten</span>
                <button id="btn-toggle-fav" class="chevron-btn">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>
                </button>
            </div>
            <div id="favorites-content"></div>
        </div>
    </div>

    <div id="card-overlay"></div>

    <div id="edit-modal" class="modal-overlay">
        <div class="modal-content aero-glass-strong">
            <h2 id="modal-title">Element bearbeiten</h2>
            <input type="text" id="edit-name" placeholder="Name" class="text-input">
            <textarea id="edit-text" placeholder="Prompt-Text (Platzhalter: ***Name***)" class="text-input" rows="8"></textarea>
            <div class="modal-actions">
                <button id="btn-save-modal" class="primary-btn">Speichern</button>
                <button id="btn-cancel-modal" class="ghost-btn">Abbrechen</button>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>

    <script src="app.js"></script>
</body>
</html>
