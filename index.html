<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#090b0f">
  <meta name="color-scheme" content="dark">
  <meta name="description" content="RadPrompt – synchrones Schnellzugriffsboard für radiologische KI-Prompts">
  <meta name="application-name" content="RadPrompt">
  <title>RadPrompt</title>
  <link rel="icon" href="/assets/icon.svg" type="image/svg+xml">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="stylesheet" href="/assets/styles.css">
  <script defer src="/assets/seed.js"></script>
  <script defer src="/assets/app.js"></script>
</head>
<body>
  <a class="skip-link" href="#mainContent">Zum Inhalt springen</a>
  <div class="backdrop-orb orb-one" aria-hidden="true"></div>
  <div class="backdrop-orb orb-two" aria-hidden="true"></div>
  <div class="noise" aria-hidden="true"></div>

  <svg class="svg-sprite" aria-hidden="true">
    <symbol id="i-search" viewBox="0 0 24 24"><path d="m20 20-4.4-4.4m2.4-5.1a7.5 7.5 0 1 1-15 0 7.5 7.5 0 0 1 15 0Z"/></symbol>
    <symbol id="i-plus" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></symbol>
    <symbol id="i-folder-plus" viewBox="0 0 24 24"><path d="M3.5 7.5h6l2-2h9v13h-17v-11Z"/><path d="M14 10v5m-2.5-2.5h5"/></symbol>
    <symbol id="i-settings" viewBox="0 0 24 24"><path d="M12 8.5a3.5 3.5 0 1 0 0 7 3.5 3.5 0 0 0 0-7Z"/><path d="m19 13.5 1.5 1-2 3.5-1.7-.7a8 8 0 0 1-2.3 1.3L14.2 21h-4.4l-.3-2.4a8 8 0 0 1-2.3-1.3l-1.7.7-2-3.5 1.5-1a8 8 0 0 1 0-3l-1.5-1 2-3.5 1.7.7a8 8 0 0 1 2.3-1.3L9.8 3h4.4l.3 2.4a8 8 0 0 1 2.3 1.3l1.7-.7 2 3.5-1.5 1a8 8 0 0 1 0 3Z"/></symbol>
    <symbol id="i-grid" viewBox="0 0 24 24"><path d="M4 4h6v6H4zM14 4h6v6h-6zM4 14h6v6H4zM14 14h6v6h-6z"/></symbol>
    <symbol id="i-list" viewBox="0 0 24 24"><path d="M9 6h11M9 12h11M9 18h11M4 6h.1M4 12h.1M4 18h.1"/></symbol>
    <symbol id="i-star" viewBox="0 0 24 24"><path d="m12 3 2.7 5.5 6.1.9-4.4 4.3 1 6.1-5.4-2.9-5.4 2.9 1-6.1-4.4-4.3 6.1-.9L12 3Z"/></symbol>
    <symbol id="i-copy" viewBox="0 0 24 24"><path d="M8 8h11v12H8z"/><path d="M5 16H4V4h11v1"/></symbol>
    <symbol id="i-expand" viewBox="0 0 24 24"><path d="M8 3H3v5M16 3h5v5M8 21H3v-5M16 21h5v-5"/></symbol>
    <symbol id="i-more" viewBox="0 0 24 24"><path d="M5 12h.01M12 12h.01M19 12h.01"/></symbol>
    <symbol id="i-chevron" viewBox="0 0 24 24"><path d="m9 5 7 7-7 7"/></symbol>
    <symbol id="i-folder" viewBox="0 0 24 24"><path d="M3.5 7.5h6l2-2h9v13h-17v-11Z"/></symbol>
    <symbol id="i-cloud" viewBox="0 0 24 24"><path d="M7.5 18.5h10a4 4 0 0 0 .7-7.9A6.5 6.5 0 0 0 5.7 9.1a4.7 4.7 0 0 0 1.8 9.4Z"/></symbol>
    <symbol id="i-check" viewBox="0 0 24 24"><path d="m5 12.5 4.5 4.5L19 7.5"/></symbol>
    <symbol id="i-alert" viewBox="0 0 24 24"><path d="M12 4 3 20h18L12 4Z"/><path d="M12 9v5m0 3h.01"/></symbol>
    <symbol id="i-drag" viewBox="0 0 24 24"><path d="M8 7h.01M16 7h.01M8 12h.01M16 12h.01M8 17h.01M16 17h.01"/></symbol>
    <symbol id="i-close" viewBox="0 0 24 24"><path d="m6 6 12 12M18 6 6 18"/></symbol>
    <symbol id="i-edit" viewBox="0 0 24 24"><path d="m4 16.5-.5 4 4-.5L19 8.5 15.5 5 4 16.5Z"/><path d="m13.5 7 3.5 3.5"/></symbol>
    <symbol id="i-trash" viewBox="0 0 24 24"><path d="M5 7h14M9 7V4h6v3M7 7l1 13h8l1-13M10 11v5M14 11v5"/></symbol>
    <symbol id="i-duplicate" viewBox="0 0 24 24"><path d="M8 8h11v11H8z"/><path d="M5 16H4V4h12v1"/></symbol>
    <symbol id="i-download" viewBox="0 0 24 24"><path d="M12 3v12m-4-4 4 4 4-4M4 20h16"/></symbol>
    <symbol id="i-upload" viewBox="0 0 24 24"><path d="M12 17V5m-4 4 4-4 4 4M4 20h16"/></symbol>
    <symbol id="i-reset" viewBox="0 0 24 24"><path d="M5 8V4m0 0h4M5 4a8 8 0 1 1-1 10"/></symbol>
    <symbol id="i-command" viewBox="0 0 24 24"><path d="M9 7V5a3 3 0 1 0-3 3h12a3 3 0 1 0-3-3v14a3 3 0 1 0 3-3H6a3 3 0 1 0 3 3V7Z"/></symbol>
  </svg>

  <div id="app" class="app-shell">
    <aside id="sidebar" class="sidebar glass-panel" aria-label="Ordnernavigation">
      <button class="brand" type="button" data-action="home" aria-label="RadPrompt – alle Prompts">
        <span class="brand-mark" aria-hidden="true">R</span>
        <span class="brand-copy"><strong>RadPrompt</strong><small>Clinical prompt board</small></span>
      </button>

      <div class="sidebar-primary" role="navigation" aria-label="Hauptansichten">
        <button class="nav-item is-active" type="button" data-view-id="all">
          <span class="nav-icon"><svg><use href="#i-grid"/></svg></span><span>Alle Prompts</span><span id="allCount" class="nav-count">0</span>
        </button>
        <button class="nav-item" type="button" data-view-id="favorites">
          <span class="nav-icon"><svg><use href="#i-star"/></svg></span><span>Favoriten</span><span id="favoriteCount" class="nav-count">0</span>
        </button>
      </div>

      <div class="sidebar-section-head">
        <span>Ordner</span>
        <button class="mini-icon-btn" type="button" data-action="new-folder" aria-label="Neuen Ordner erstellen" title="Neuer Ordner"><svg><use href="#i-plus"/></svg></button>
      </div>
      <div id="folderTree" class="folder-tree" role="tree" aria-label="Promptordner"></div>

      <div class="sidebar-footer">
        <button id="syncStatus" class="sync-status" type="button" data-action="sync-details">
          <span class="sync-dot" aria-hidden="true"></span>
          <span class="sync-copy"><strong>Synchronisiert</strong><small>Cloudflare KV</small></span>
          <svg><use href="#i-chevron"/></svg>
        </button>
      </div>
    </aside>

    <div class="workspace">
      <header class="topbar glass-panel">
        <div class="mobile-brand">
          <span class="brand-mark" aria-hidden="true">R</span><strong>RadPrompt</strong>
        </div>
        <label class="search-control" for="searchInput">
          <svg><use href="#i-search"/></svg>
          <input id="searchInput" type="search" autocomplete="off" spellcheck="false" placeholder="Prompts, Ordner oder Inhalte durchsuchen…">
          <span class="shortcut-hint"><kbd>Strg</kbd><kbd>K</kbd></span>
        </label>
        <div class="top-actions">
          <button class="toolbar-btn primary-action" type="button" data-action="new-prompt"><svg><use href="#i-plus"/></svg><span>Prompt</span></button>
          <button class="toolbar-btn icon-only" type="button" data-action="new-folder" aria-label="Neuer Ordner" title="Neuer Ordner"><svg><use href="#i-folder-plus"/></svg></button>
          <button class="toolbar-btn icon-only" type="button" data-action="command" aria-label="Befehlsmenü" title="Befehlsmenü"><svg><use href="#i-command"/></svg></button>
          <button class="toolbar-btn icon-only" type="button" data-action="settings" aria-label="Einstellungen" title="Einstellungen"><svg><use href="#i-settings"/></svg></button>
        </div>
      </header>

      <div id="syncBanner" class="sync-banner" role="status" hidden></div>

      <nav id="folderDock" class="folder-dock glass-panel" aria-label="Ordnerauswahl"></nav>

      <section id="favoriteBar" class="favorite-bar glass-panel" aria-label="Favoritenschnellzugriff" hidden>
        <div class="favorite-label"><span class="favorite-star"><svg><use href="#i-star"/></svg></span><span><strong>Favoriten</strong><small>Schnellzugriff</small></span></div>
        <div id="favoriteItems" class="favorite-items"></div>
      </section>

      <main id="mainContent" tabindex="-1">
        <div class="page-head">
          <div class="page-title-block">
            <nav id="breadcrumbs" class="breadcrumbs" aria-label="Brotkrümelnavigation"></nav>
            <div class="title-row">
              <div>
                <p class="eyebrow">Promptbibliothek</p>
                <h1 id="viewTitle">Alle Prompts</h1>
                <p id="viewMeta" class="view-meta">0 Templates</p>
              </div>
              <div class="page-actions">
                <div class="segmented-control" role="group" aria-label="Darstellung">
                  <button class="segment is-active" type="button" data-layout="grid" aria-pressed="true" title="Karten"><svg><use href="#i-grid"/></svg></button>
                  <button class="segment" type="button" data-layout="compact" aria-pressed="false" title="Kompakt"><svg><use href="#i-list"/></svg></button>
                </div>
                <button class="toolbar-btn icon-only context-folder-action" type="button" data-action="folder-menu" aria-label="Ordneroptionen" title="Ordneroptionen"><svg><use href="#i-more"/></svg></button>
              </div>
            </div>
          </div>
        </div>

        <section id="subfolderSection" class="subfolder-section" hidden>
          <div class="section-head"><h2>Unterordner</h2><span id="subfolderCount"></span></div>
          <div id="subfolderGrid" class="subfolder-grid"></div>
        </section>

        <section class="prompt-section" aria-labelledby="promptSectionTitle">
          <div class="section-head visually-hidden"><h2 id="promptSectionTitle">Prompts</h2></div>
          <div id="promptGrid" class="prompt-grid" aria-live="polite"></div>
          <div id="emptyState" class="empty-state glass-panel" hidden>
            <span class="empty-icon"><svg><use href="#i-search"/></svg></span>
            <h2>Keine passenden Prompts</h2>
            <p>Suchbegriff ändern, einen anderen Ordner öffnen oder ein neues Template anlegen.</p>
            <button class="toolbar-btn primary-action" type="button" data-action="new-prompt"><svg><use href="#i-plus"/></svg><span>Neuen Prompt erstellen</span></button>
          </div>
        </section>
      </main>
    </div>
  </div>

  <nav class="mobile-bottom-nav glass-panel" aria-label="Mobile Navigation">
    <button class="bottom-nav-item is-active" type="button" data-view-id="all"><svg><use href="#i-grid"/></svg><span>Alle</span></button>
    <button class="bottom-nav-item" type="button" data-view-id="favorites"><svg><use href="#i-star"/></svg><span>Favoriten</span></button>
    <button class="bottom-nav-create" type="button" data-action="new-prompt" aria-label="Neuer Prompt"><svg><use href="#i-plus"/></svg></button>
    <button class="bottom-nav-item" type="button" data-action="folders"><svg><use href="#i-folder"/></svg><span>Ordner</span></button>
    <button class="bottom-nav-item" type="button" data-action="settings"><svg><use href="#i-settings"/></svg><span>Mehr</span></button>
  </nav>

  <div id="toastRegion" class="toast-region" aria-live="polite" aria-atomic="true"></div>
  <div id="liveRegion" class="visually-hidden" aria-live="assertive"></div>
  <div id="dragLayer" class="drag-layer" aria-hidden="true"></div>

  <dialog id="promptDialog" class="app-dialog prompt-dialog" aria-labelledby="promptDialogTitle">
    <div class="dialog-surface glass-panel">
      <header class="dialog-head">
        <div><p class="dialog-eyebrow">Prompt</p><h2 id="promptDialogTitle">Prompt öffnen</h2></div>
        <button class="dialog-close" type="button" data-dialog-close aria-label="Schließen"><svg><use href="#i-close"/></svg></button>
      </header>
      <div id="promptDialogBody" class="dialog-body"></div>
      <footer id="promptDialogFoot" class="dialog-foot"></footer>
    </div>
  </dialog>

  <dialog id="formDialog" class="app-dialog form-dialog" aria-labelledby="formDialogTitle">
    <form id="formDialogForm" class="dialog-surface glass-panel" method="dialog">
      <header class="dialog-head">
        <div><p id="formDialogEyebrow" class="dialog-eyebrow">Bearbeiten</p><h2 id="formDialogTitle">Element bearbeiten</h2></div>
        <button class="dialog-close" type="button" data-dialog-close aria-label="Schließen"><svg><use href="#i-close"/></svg></button>
      </header>
      <div id="formDialogBody" class="dialog-body"></div>
      <footer id="formDialogFoot" class="dialog-foot"></footer>
    </form>
  </dialog>

  <dialog id="commandDialog" class="app-dialog command-dialog" aria-label="Befehlsmenü">
    <div class="dialog-surface glass-panel">
      <div class="command-search"><svg><use href="#i-search"/></svg><input id="commandInput" autocomplete="off" placeholder="Befehl oder Prompt suchen…"><button class="dialog-close" type="button" data-dialog-close aria-label="Schließen"><kbd>Esc</kbd></button></div>
      <div id="commandResults" class="command-results" role="listbox"></div>
    </div>
  </dialog>

  <template id="promptCardTemplate">
    <article class="prompt-card glass-panel" data-drag-kind="prompt">
      <div class="card-aurora" aria-hidden="true"></div>
      <header class="card-head">
        <span class="card-index"></span>
        <div class="card-head-actions">
          <button class="card-icon-btn drag-handle" type="button" aria-label="Prompt verschieben" title="Ziehen zum Sortieren"><svg><use href="#i-drag"/></svg></button>
          <button class="card-icon-btn favorite-btn" type="button" aria-label="Favorit umschalten"><svg><use href="#i-star"/></svg></button>
          <button class="card-icon-btn card-menu-btn" type="button" aria-label="Weitere Aktionen"><svg><use href="#i-more"/></svg></button>
        </div>
      </header>
      <div class="card-content">
        <p class="card-folder"></p>
        <h2 class="card-title"></h2>
        <div class="card-badges"></div>
        <div class="card-fields"></div>
      </div>
      <footer class="card-foot">
        <button class="secondary-card-btn expand-btn" type="button" aria-label="Prompt öffnen"><svg><use href="#i-expand"/></svg><span>Öffnen</span></button>
        <button class="copy-card-btn" type="button" aria-label="Prompt kopieren"><svg><use href="#i-copy"/></svg><span>Kopieren</span></button>
      </footer>
    </article>
  </template>

  <template id="folderTileTemplate">
    <article class="folder-tile glass-panel" data-drag-kind="folder">
      <button class="folder-tile-open" type="button" aria-label="Ordner öffnen">
        <span class="folder-tile-icon"><svg><use href="#i-folder"/></svg></span>
        <span class="folder-tile-copy"><strong></strong><small></small></span>
        <svg class="folder-arrow"><use href="#i-chevron"/></svg>
      </button>
      <button class="folder-tile-menu" type="button" aria-label="Ordneroptionen"><svg><use href="#i-more"/></svg></button>
    </article>
  </template>
</body>
</html>
