<!DOCTYPE html>
<html lang="de" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="description" content="RadPrompt - Kompaktes Schnellzugriffsboard für radiologische KI-Prompts.">
    <meta name="theme-color" content="#050507">
    <link rel="icon" type="image/svg+xml" href="assets/app-icon.svg">
    <link rel="apple-touch-icon" href="assets/app-icon.svg">
    <title>RadPrompt</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/Flip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.2/Sortable.min.js"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="app-host">

    <div id="preloader" class="preloader">
        <div class="preloader-spinner"></div>
    </div>

    <div id="background-effects" class="fixed inset-0 z-0 overflow-hidden pointer-events-none">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="noise-overlay fixed inset-0 z-1 pointer-events-none"></div>

    <div id="radprompt-app" class="widget-container">

        <header class="widget-header">
            <div class="header-left">
                <button id="back-btn" class="icon-btn hidden" aria-label="Zurück">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                </button>
                <h1 id="app-title" class="select-none">Home</h1>
                <div id="breadcrumb" class="breadcrumb hidden md:flex items-center gap-2"></div>
            </div>
            <div class="header-right">
                <button id="add-prompt-btn" class="action-btn" aria-label="Prompt hinzufügen">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
                    <span>Prompt</span>
                </button>
                <button id="add-folder-btn" class="action-btn" aria-label="Ordner hinzufügen">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
                    <span>Ordner</span>
                </button>
                <button id="sort-btn" class="icon-btn" aria-label="Sortiermodus umschalten">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 16 4 4 4-4M7 20V4M11 4h10M11 8h7M11 12h4"/></svg>
                </button>
                <button id="pin-window-btn" class="icon-btn" aria-label="Immer im Vordergrund umschalten" title="Immer im Vordergrund">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 17v5"/><path d="M9 10.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24V16h14v-.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V4h1a2 2 0 0 0 0-4H8a2 2 0 0 0 0 4h1z"/></svg>
                </button>
            </div>
        </header>

        <main id="cards-container" class="cards-grid custom-scrollbar"></main>

        <footer class="widget-footer">
            <div id="favorites-bar" class="favorites-bar">
                <div class="favorites-label">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                    <span>Favoriten</span>
                </div>
                <div id="favorites-container" class="favorites-list custom-scrollbar-horizontal"></div>
            </div>
        </footer>

    </div>

    <div id="modal-overlay" class="modal-overlay fixed inset-0 z-50 hidden items-center justify-center p-4">
        <div id="modal-content" class="modal-content w-full max-w-2xl max-h-[90vh] flex flex-col"></div>
    </div>

    <div id="context-menu" class="context-menu hidden" role="menu" aria-label="Kartenaktionen"></div>

    <div id="toast-container" class="toast-container fixed bottom-20 left-1/2 -translate-x-1/2 z-[100] flex flex-col items-center gap-2 pointer-events-none" aria-live="polite" aria-atomic="true"></div>

    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
