<!doctype html>
<html lang="de" data-theme="dark">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0b0d10"><meta name="color-scheme" content="dark">
<title>RadPrompt</title>
<meta name="description" content="Schnellzugriffsboard für radiologische KI-Prompt-Templates">
<link rel="manifest" href="/manifest.webmanifest"><link rel="icon" href="/assets/icon.svg" type="image/svg+xml">
<link rel="stylesheet" href="/assets/app.css">
</head>
<body>
<div class="ambient" aria-hidden="true"><i></i><i></i><i></i></div>
<div id="app" class="shell">
<header class="topbar glass">
  <div class="brand"><div class="brandmark">R</div><div><h1>RadPrompt</h1><p id="syncText">Initialisierung…</p></div></div>
  <div class="top-actions">
    <button class="icon-btn" id="searchBtn" title="Suchen (Strg+K)" aria-label="Suchen"><span>⌕</span></button>
    <button class="icon-btn" id="settingsBtn" title="Einstellungen" aria-label="Einstellungen"><span>⚙</span></button>
    <button class="primary-btn" id="newPromptBtn"><span>＋</span> Prompt</button>
  </div>
</header>
<section class="command glass">
  <div class="search-wrap"><span>⌕</span><input id="searchInput" type="search" placeholder="Prompts durchsuchen…" autocomplete="off"><kbd>Ctrl K</kbd></div>
  <button class="filter-btn active" data-filter="all">Alle</button>
  <button class="filter-btn" data-filter="favorites">Favoriten</button>
</section>
<section class="favorites glass" id="favoritesSection" hidden>
  <div class="section-label"><span>Favoriten</span><small>Schnellzugriff</small></div>
  <div class="favorite-track" id="favoriteTrack"></div>
</section>
<nav class="folder-rail" id="folderRail" aria-label="Ordner"></nav>
<main>
  <div class="content-head"><div><p class="eyebrow">Prompt-Bibliothek</p><h2 id="viewTitle">Alle Prompts</h2></div><div class="content-meta"><span id="countText">0 Prompts</span><button class="icon-btn small" id="newFolderBtn" title="Ordner hinzufügen">＋</button></div></div>
  <div class="prompt-grid" id="promptGrid"></div>
  <div class="empty glass" id="emptyState" hidden><div>⌁</div><h3>Keine Prompts gefunden</h3><p>Suchbegriff oder Filter ändern.</p></div>
</main>
</div>
<div class="toast-stack" id="toastStack" aria-live="polite"></div>
<dialog id="editorDialog" class="modal glass"><form method="dialog" id="editorForm">
  <div class="modal-head"><div><p class="eyebrow">Prompt bearbeiten</p><h2 id="editorTitle">Prompt</h2></div><button class="icon-btn" value="cancel" aria-label="Schließen">×</button></div>
  <div class="form-grid"><label>Titel<input id="editTitle" required maxlength="120"></label><label>Ordner<select id="editFolder"></select></label></div>
  <label>Prompttext<textarea id="editContent" required spellcheck="false"></textarea></label>
  <div class="placeholder-preview" id="placeholderPreview"></div>
  <div class="modal-actions"><button type="button" class="danger-btn" id="deletePromptBtn">Löschen</button><span></span><button value="cancel" class="secondary-btn">Abbrechen</button><button type="submit" class="primary-btn">Speichern</button></div>
</form></dialog>
<dialog id="folderDialog" class="modal small-modal glass"><form method="dialog" id="folderForm"><div class="modal-head"><div><p class="eyebrow">Organisation</p><h2>Neuer Ordner</h2></div><button class="icon-btn" value="cancel">×</button></div><label>Ordnername<input id="folderName" required maxlength="50"></label><div class="modal-actions"><span></span><span></span><button value="cancel" class="secondary-btn">Abbrechen</button><button type="submit" class="primary-btn">Anlegen</button></div></form></dialog>
<dialog id="settingsDialog" class="modal small-modal glass"><form method="dialog"><div class="modal-head"><div><p class="eyebrow">System</p><h2>Einstellungen</h2></div><button class="icon-btn" value="cancel">×</button></div><div class="settings-list"><label class="switch-row"><span><b>Kompakte Karten</b><small>Reduzierte Kartenhöhe</small></span><input type="checkbox" id="compactToggle"></label><button type="button" class="secondary-btn full" id="exportBtn">Daten exportieren</button><label class="secondary-btn full file-label">Daten importieren<input type="file" id="importInput" accept="application/json" hidden></label><button type="button" class="danger-btn full" id="resetBtn">Startdaten wiederherstellen</button></div></form></dialog>
<script type="module" src="/assets/app.js"></script>
</body></html>
